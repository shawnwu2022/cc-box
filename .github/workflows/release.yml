name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            name: 'macos-x64'
            patterns: |
              src-tauri/target/**/bundle/dmg/*.dmg
              src-tauri/target/**/*.app.tar.gz
          - platform: 'ubuntu-22.04'
            target: ''
            name: 'linux'
            patterns: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: 'windows-latest'
            target: ''
            name: 'windows'
            patterns: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build application
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri build -- --target ${{ matrix.target }}
          else
            npm run tauri build
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cc-box-${{ matrix.name }}
          path: ${{ matrix.patterns }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/cc-box-windows/**/*.exe
            artifacts/cc-box-windows/**/*.msi
            artifacts/cc-box-macos-x64/**/*.dmg
            artifacts/cc-box-macos-x64/**/*.app.tar.gz
            artifacts/cc-box-linux/**/*.deb
            artifacts/cc-box-linux/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-gitee-release:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release info from GitHub
        id: gh_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          BODY=$(gh release view "$TAG" --json body -q '.body')
          NAME=$(gh release view "$TAG" --json name -q '.name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "$BODY" > /tmp/release_body.txt

      - name: Download GitHub release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.gh_release.outputs.tag }}"
          mkdir -p /tmp/release-assets
          gh release download "$TAG" --dir /tmp/release-assets --repo "$GITHUB_REPOSITORY"
          echo "Downloaded assets:"
          ls -la /tmp/release-assets

      - name: Create Gitee Release and Upload Assets
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.gh_release.outputs.tag }}"
          NAME="${{ steps.gh_release.outputs.name }}"
          GITEE_API="https://gitee.com/api/v5/repos/orczh/cc-box"

          # Check if release already exists on Gitee
          HTTP_CODE=$(curl -s -o /tmp/gitee_existing.json -w "%{http_code}" \
            "${GITEE_API}/releases/tags/${TAG}?access_token=${GITEE_TOKEN}")

          RELEASE_ID=""
          if [ "$HTTP_CODE" = "200" ]; then
            RELEASE_ID=$(jq -r '.id' /tmp/gitee_existing.json)
            echo "Release $TAG already exists on Gitee (id=$RELEASE_ID), uploading assets..."
          else
            echo "Release $TAG not found on Gitee (HTTP $HTTP_CODE), creating..."
            RESPONSE=$(curl -s -X POST "${GITEE_API}/releases" \
              --data-urlencode "access_token=${GITEE_TOKEN}" \
              --data-urlencode "tag_name=${TAG}" \
              --data-urlencode "name=${NAME:-${TAG}}" \
              --data-urlencode "body@/tmp/release_body.txt" \
              --data-urlencode "prerelease=false")
            RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
            if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
              echo "ERROR: Failed to create Gitee release. Response:"
              echo "$RESPONSE" | jq . 2>/dev/null || echo "$RESPONSE"
              exit 1
            fi
            echo "Created Gitee release $TAG (id=$RELEASE_ID)"
          fi

          # Upload all downloaded assets to Gitee
          UPLOAD_URL="${GITEE_API}/releases/${RELEASE_ID}/attach_files"
          for file in /tmp/release-assets/*; do
            [ -f "$file" ] || continue
            FNAME=$(basename "$file")
            echo "Uploading $FNAME to Gitee (release_id=$RELEASE_ID)..."
            HTTP_CODE=$(curl -s -o /tmp/gitee_upload.json -w "%{http_code}" \
              -X POST "$UPLOAD_URL" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "file=@${file}")
            if [ "$HTTP_CODE" -ge 300 ] || [ "$HTTP_CODE" -lt 200 ]; then
              echo "WARNING: Upload of $FNAME returned HTTP $HTTP_CODE"
              cat /tmp/gitee_upload.json
            else
              echo "  Uploaded: $FNAME (HTTP $HTTP_CODE)"
            fi
          done

          echo "All assets uploaded to Gitee"
