name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            name: 'macos-x64'
            patterns: |
              src-tauri/target/**/bundle/dmg/*.dmg
              src-tauri/target/**/*.app.tar.gz
          - platform: 'ubuntu-22.04'
            target: ''
            name: 'linux'
            patterns: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
          - platform: 'windows-latest'
            target: ''
            name: 'windows'
            patterns: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build application
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri build -- --target ${{ matrix.target }}
          else
            npm run tauri build
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cc-box-${{ matrix.name }}
          path: ${{ matrix.patterns }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts -type f | head -50

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/cc-box-windows/**/*.exe
            artifacts/cc-box-windows/**/*.msi
            artifacts/cc-box-macos-x64/**/*.dmg
            artifacts/cc-box-macos-x64/**/*.app.tar.gz
            artifacts/cc-box-linux/**/*.deb
            artifacts/cc-box-linux/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-gitee-release:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get release info from GitHub
        id: gh_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Get release body and name
          BODY=$(gh release view "$TAG" --json body -q '.body')
          NAME=$(gh release view "$TAG" --json name -q '.name')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          # Write body to file for multipart upload
          echo "$BODY" > release_body.md

      - name: Create Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          TAG="${{ steps.gh_release.outputs.tag }}"
          NAME="${{ steps.gh_release.outputs.name }}"
          BODY=$(cat release_body.md)

          # Check if release already exists
          EXISTING=$(curl -s "https://gitee.com/api/v5/repos/orczh/cc-box/releases/tags/$TAG?access_token=$GITEE_TOKEN")

          if echo "$EXISTING" | python3 -c "import sys,json; json.load(sys.stdin); exit(0)" 2>/dev/null; then
            echo "Release $TAG already exists on Gitee, skipping"
            exit 0
          fi

          # Create release
          curl -s -X POST "https://gitee.com/api/v5/repos/orczh/cc-box/releases" \
            -d "access_token=$GITEE_TOKEN" \
            -d "tag_name=$TAG" \
            -d "name=${NAME:-$TAG}" \
            -d "body=$(python3 -c "import urllib.parse; print(urllib.parse.quote('''$BODY'''))")" \
            -d "prerelease=false"
